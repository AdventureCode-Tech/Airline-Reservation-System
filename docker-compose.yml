services:
  backend-api:
    build:
      context: ./Airline.Api
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Double underscores (__) are used to override nested appsettings.json fields in ASP.NET Core
      # Uncomment and configure the fields below to customize email and provider settings:
      # - Email__Provider=Chained
      # - Email__NotificationEmail=your-email@gmail.com
      # - Email__FromEmail=your-email@gmail.com
      # - Email__SmtpProviders__0__Name=Gmail
      # - Email__SmtpProviders__0__Host=smtp.gmail.com
      # - Email__SmtpProviders__0__Port=587
      # - Email__SmtpProviders__0__Username=your-email@gmail.com
      # - Email__SmtpProviders__0__Password=your-gmail-app-password
      # - Ignav__BaseUrl=https://ignav.com/api/
      # - Ignav__ApiKey=your-api-key

  frontend-web:
    build:
      context: ./airline-web
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend-api
