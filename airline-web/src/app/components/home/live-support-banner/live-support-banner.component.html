<section class="bg-slate-50 py-14">
  <div class="mx-auto max-w-7xl px-4 lg:px-6">
    <div class="relative overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
      <!-- Gradient top border -->
      <div class="h-1 bg-gradient-to-r from-brand-orange via-pink-500 to-purple-500"></div>

      <div class="flex flex-col items-start justify-between gap-8 p-8 lg:flex-row lg:items-center lg:p-10">
        <div class="max-w-xl">
          <span class="inline-flex items-center gap-2 rounded-full bg-emerald-50 px-3 py-1 text-xs font-bold uppercase tracking-wide text-emerald-700">
            <span class="h-2 w-2 rounded-full bg-emerald-500"></span>
            Live Support
          </span>
          <h2 class="mt-4 font-serif text-2xl font-semibold text-slate-900 sm:text-3xl">
            Need Help Planning Your Trip?
          </h2>
          <p class="mt-3 text-sm leading-relaxed text-slate-600 sm:text-base">
            Our travel experts are standing by to help you find the perfect destination and best deals.
          </p>
        </div>

        <div class="flex w-full flex-col gap-3 sm:w-auto sm:flex-row">
          <a
            [href]="site.phoneHref"
            class="inline-flex items-center justify-center gap-2 rounded-xl bg-brand-navy px-6 py-3.5 text-sm font-semibold text-white transition hover:bg-slate-800"
          >
            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
              <path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"/>
            </svg>
            {{ site.phone }}
          </a>
          <a
            routerLink="/contact"
            class="inline-flex items-center justify-center gap-2 rounded-xl border border-slate-300 bg-white px-6 py-3.5 text-sm font-semibold text-slate-800 transition hover:bg-slate-50"
          >
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            Send Message
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
